# Source: mychart/templates/pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: srsran-gnb-0
spec:
  hostNetwork: true
  nodeName: k8s-worker5
  containers:
  - name: srsran-gnb
    image: fatimkone04/srsran:w5
    imagePullPolicy: Always
    env:
    - name: LD_LIBRARY_PATH
      value: /usr/local/lib64
    command: ["/bin/bash"]
    args:
      - -c
      - |
        taskset -c 4-26 ./build/apps/gnb/gnb -c /config/gnb.conf
        sleep infinity
    securityContext:
      privileged: true
    resources:
      requests:
        memory: "8Gi"
        hugepages-1Gi: "8Gi"
        ephemeral-storage: "10Gi"
      limits:
        memory: "8Gi"
        hugepages-1Gi: "8Gi"
        ephemeral-storage: "10Gi"
    volumeMounts:
      - name: hugepage
        mountPath: /dev/hugepages
      - name: vfio
        mountPath: /dev/vfio
      - name: sysfs
        mountPath: /sys
        readOnly: false
      - name: firmware
        mountPath: /lib/firmware
        readOnly: true
      # optional (only if you need kernel modules visibility inside container)
      - name: modules
        mountPath: /lib/modules
        readOnly: true
      - name: ran-config
        mountPath: /config
  volumes:
  - name: hugepage
    emptyDir:
      medium: "HugePages"
  - name: vfio
    hostPath:
      path: /dev/vfio
      type: Directory
  - name: sysfs
    hostPath:
      path: /sys
      type: Directory
  - name: firmware
    hostPath:
      path: /lib/firmware
      type: Directory
  - name: modules
    hostPath:
      path: /lib/modules
      type: Directory
  - name: ran-config
    configMap:
      name: srsran-gnb-config-0
      items:
      - key: gnb.conf
        path: gnb.conf
