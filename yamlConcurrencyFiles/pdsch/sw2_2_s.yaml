---
# Source: mychart/templates/gnb_config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: srsran-gnb-config-0
data:
  gnb.conf: |

    cu_up:
      warn_on_drop: False

    cu_cp:
      amf:
        addr: 172.30.129.35
        bind_addr: 10.0.0.20
        supported_tracking_areas:
          - tac: 1
            plmn_list:
              - plmn: "99999"
                tai_slice_support_list:
                  - sst: 1
                    sd: 1

    buffer_pool:
      nof_segments: 1048576

    ru_ofh:
      t1a_max_cp_dl: 500
      t1a_min_cp_dl: 450
      t1a_max_cp_ul: 350
      t1a_min_cp_ul: 290
      t1a_max_up: 360
      t1a_min_up: 300
      ta4_max: 400
      ta4_min: 0
      is_prach_cp_enabled: false
      enable_lf_prach_slot_autoderivation: true
      ignore_ecpri_payload_size: true
      compr_method_ul: bfp
      compr_bitwidth_ul: 9
      compr_method_dl: bfp
      compr_bitwidth_dl: 9
      compr_method_prach: bfp
      compr_bitwidth_prach: 9
      enable_ul_static_compr_hdr: true
      enable_dl_static_compr_hdr: true
      iq_scaling: 10.0
      cells:
        - network_interface: 0000:86:01.2
          ru_mac_addr: 70:b3:d5:e1:5f:b9
          du_mac_addr: 00:11:22:33:66:88
          vlan_tag_cp: 7
          vlan_tag_up: 7
          prach_port_id: [4, 5, 6, 7]
          dl_port_id: [0, 1, 2, 3]
          ul_port_id: [0, 1, 2, 3]

    cells:
      - pci: 1
    cell_cfg:
      dl_arfcn: 660000
      band: 77
      channel_bandwidth_MHz: 100
      common_scs: 30
      plmn: "99999"
      tac: 1
      nof_antennas_dl: 4
      nof_antennas_ul: 4
      prach:
        prach_config_index: 7
        prach_root_sequence_index: 1
        zero_correlation_zone: 0
        prach_frequency_start: 0
        preamble_trans_max: 50
        power_ramping_step_db: 4
      tdd_ul_dl_cfg:
        dl_ul_tx_period: 10
        nof_dl_slots: 7
        nof_dl_symbols: 6
        nof_ul_slots: 2
        nof_ul_symbols: 4
      ssb:
        ssb_block_power_dbm: -16
      pdsch:
        mcs_table: qam256
        max_ue_mcs: 27
        olla_target_bler: 0.1
        dmrs_additional_position: 3
      pusch:
        max_ue_mcs: 27
        mcs_table: qam256
        olla_target_bler: 0.1
        dmrs_additional_position: 2

    test_mode:
      test_ue:
        rnti: 1
        pdsch_active: true
        pusch_active: false
        ri: 4
        cqi: 15
        nof_ues: 1

    hal:
      eal_args: "--lcores=(0-3)@(4-26) -a 0000:86:01.2"

    expert_phy:
      max_request_headroom_slots: 3
      max_proc_delay: 4
      pusch_dec_max_iterations: 2
  
    log:
      filename: /tmp/gnb.log
      phy_level: info
      all_level: error
  
    metrics:
      enable_log: true
      enable_verbose: true
      layers:
        enable_sched: true
        enable_du_low: true

    expert_execution:
      threads:
        upper_phy:
          max_pdsch_concurrency: 2
          max_pusch_and_srs_concurrency: 1
---
